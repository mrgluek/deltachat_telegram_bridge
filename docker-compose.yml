services:
  bridge:
    image: deltachat_telegram_bridge:latest
    build:
      context: .
      args:
        UID: ${HOST_UID:-1000}
        GID: ${HOST_GID:-1000}
    container_name: tg_dc_bridge
    restart: unless-stopped
    volumes:
      - ./bridge.db:/app/bridge.db
      - ./userbot_session.session:/app/userbot_session.session
      # Directory created by deltabot-cli to store account data
      - ~/.config/tgbridge:/home/bot/.config/tgbridge
    environment:
      # Optional: set token via env variable, or use initialized db
      # TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      - PYTHONUNBUFFERED=1

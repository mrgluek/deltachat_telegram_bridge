services:
  bridge:
    image: deltachat_telegram_bridge:latest
    build:
      context: .
    container_name: tg_dc_bridge
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./data:/app/data
    environment:
      # Optional: set token via env variable, or use initialized db
      # TELEGRAM_TOKEN: "${TELEGRAM_TOKEN}"
      - DB_PATH=/app/data/bridge.db
      - USERBOT_SESSION_PATH=/app/data/userbot_session
      - XDG_CONFIG_HOME=/app/data
      - PYTHONUNBUFFERED=1
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
